<!DOCTYPE html>
<html>

<head>
    <title>Progress</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/progress.css') }}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="navbar">

        <div class="navbar-brand">
            <span class="brand-dot"></span>
            <b>Mood Study AI</b>
        </div>

        <div class="navbar-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/dashboard/analytics">Analytics</a>
            <a href="/auth/logout" class="logout-link">Logout</a>
        </div>

    </div>

    <h1>📈 Your Study Progress</h1>

    <div class="container">

        <!-- LEFT SIDE -->
        <div class="left">

            <div class="card fade-up">
                <h2>Overall Progress</h2>

                <div class="progress-bar">
                    <div class="fill" style="width: {{ progress_percent }}%;">
                        {{ progress_percent }}%
                    </div>
                </div>
            </div>

            <div class="card fade-up delay-1">
                <h2>Summary</h2>

                <p>Total Days: {{ total_days }}</p>
                <p>Completed Days: {{ completed_days }}</p>
            </div>

            <!-- MOVED GRAPH HERE -->
            <div class="card fade-up delay-2">
                <h2>📊 Focus Graph</h2>

                <div class="chart-box">
                    <canvas id="focusChart"></canvas>
                </div>
            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="right">

            <div class="card table-card fade-up delay-3">

                <h2>📋 Progress Table</h2>

                <table>
                    <tr>
                        <th>Day</th>
                        <th>Focus %</th>
                    </tr>

                    {% for p in progress %}
                    <tr>
                        <td>{{ p.day }}</td>
                        <td>{{ p.focus_score }}%</td>
                    </tr>
                    {% endfor %}
                </table>

            </div>

        </div>

    </div>

    <a href="/dashboard">
        <button class="back-btn">Back To Dashboard</button>
    </a>

    <script>
        let progress = {{ progress | tojson }};

        let days = progress.map(p => p.day);
        let scores = progress.map(p => p.focus_score);

        new Chart(document.getElementById("focusChart"), {
            type: "line",
            data: {
                labels: days,
                datasets: [{
                    label: "Focus %",
                    data: scores,
                    borderColor: "#6366f1",
                    backgroundColor: "rgba(99,102,241,0.15)",
                    tension: 0.35,
                    fill: true,
                    pointRadius: 4,
                    pointBackgroundColor: "#6366f1"
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,

                plugins: {
                    legend: {
                        labels: {
                            color: "#374151",
                            font: {
                                family: "Plus Jakarta Sans"
                            }
                        }
                    }
                },

                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        grid: {
                            color: "rgba(0,0,0,0.05)"
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        }
                    }
                }
            }
        });
    </script>

</body>

</html>
